name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgirepository1.0-dev libglib2.0-dev libcairo2-dev libadwaita-1-dev libgtk-4-dev python3 python3-venv python3-pip python3-gi python3-gi-cairo gir1.2-gtk-4.0 gir1.2-adw-1 debhelper

      - name: Run build script
        run: |
          chmod +x build-appimage.sh
          ./build-appimage.sh

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            *.AppImage
            *.tar.gz
            *.deb
            *.dsc
            *.tar.xz
            *.buildinfo
            *.changes
          draft: false
          prerelease: false
